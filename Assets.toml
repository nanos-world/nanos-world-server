# vault configurations
[meta]
    # friendly name
    title =                 "My Awesome Asset Pack"
    # contributors
    author =                "Contributor Names"
    # version
    version =               "0.1.0"

# asset pack configurations
[asset_pack]
    # asset packs requirements
    assets_requirements = [

    ]

# unreal engine configurations
[unreal]
    # unreal engine folders to mount - the exact name of the root folders inside Content/ or Plugin/ used in Unreal
    unreal_folders = [
        "MyAssetPack",
        "MyAnotherContentFolder"
    ]
    # unreal engine version - unreal version this asset pack was compiled on
    unreal_version =        "5.7.0"
    # whether this asset pack was created as a plugin content"
    is_plugin_content =     false

# assets files
[assets]
    # maps
    [assets.maps]
        # MyMap = "MyAssetPack/Maps/MyAwesomeMap"
        # ...

    # static meshes
    [assets.static_meshes]
        # SM_Flower_01 = "MyAssetPack/Props/SM_Awesome_Flower_01"
        # SM_Rock_01 = { path = "MyAnotherContentFolder/Props/SM_Rock_01", my_tag = "something", thumbnail = "Thumbnails/SM_Rock_01.jpg" }
        # ...

    # skeletal meshes
    [assets.skeletal_meshes]
        # SK_Better_Man = "MyAssetPack/Characters/SK_BetterMan_0"
        # ...

    # sounds
    [assets.sounds]
        # A_My_Sound = "MyAnotherContentFolder/Sounds/A_My_Sound"
        # ...

    # animations
    [assets.animations]
        # A_Character_Jump = "MyAssetPack/Animations/A_Character_Jump"
        # ...

    # particles
    [assets.particles]
        # P_Big_Explosion = "MyAnotherContentFolder/Particles/P_Big_Explosion"
        # ...

    # materials
    [assets.materials]
        # M_Red_Textured = "MyAssetPack/Materials/M_Red_Textured"
        # ...

    # blueprints
    [assets.blueprints]
        # BP_Blueprint = "MyAnotherContentFolder/Blueprints/BP_Blueprint"
        # ...

    # other assets (for not yet categorized ones)
    [assets.others]
        # A_Audio_Rifle_Fire = "MyAssetPack/Audios/A_Audio_Rifle_Fire"
        # ...
